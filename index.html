<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pràctica de Fonètica PAU</title>
  <style>
    :root {
      font-family: Arial, sans-serif;
      color: #172033;
      background: #eef4f7;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 1rem;
      box-sizing: border-box;
    }

    main {
      width: min(100%, 42rem);
      background: #fff;
      padding: clamp(1.5rem, 5vw, 3rem);
      border-radius: 1rem;
      box-shadow: 0 0.5rem 1.5rem rgb(23 32 51 / 15%);
    }

    h1 { margin-top: 0; color: #073b5c; }
    .instruccions { line-height: 1.55; }
    fieldset { border: 0; padding: 0; margin: 2rem 0 1.5rem; }
    legend { font-weight: 700; font-size: 1.15rem; margin-bottom: 1rem; }

    label {
      display: block;
      margin: 0.7rem 0;
      padding: 0.9rem 1rem;
      border: 1px solid #b7c7d1;
      border-radius: 0.5rem;
      cursor: pointer;
    }

    label:has(input:checked) { border-color: #087e8b; background: #e7f7f8; }
    input { margin-right: 0.6rem; }

    button {
      border: 0;
      border-radius: 0.5rem;
      background: #087e8b;
      color: #fff;
      padding: 0.8rem 1.2rem;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover, button:focus-visible { background: #05636e; }
    #missatge { min-height: 1.5rem; margin: 1rem 0 0; font-weight: 700; }
    .correcte { color: #087238; }
    .incorrecte { color: #a22929; }
  </style>
</head>
<body>
  <main>
    <h1>Pràctica de Fonètica PAU</h1>
    <p class="instruccions">Llig la pregunta, selecciona una opció i prem «Corregir» per comprovar la resposta.</p>

    <form id="test">
      <fieldset>
        <legend>Com es pronuncia la <u>o</u> tònica de la paraula «soci»?</legend>
        <label><input type="radio" name="resposta" value="oberta"> Oberta</label>
        <label><input type="radio" name="resposta" value="tancada"> Tancada</label>
      </fieldset>
      <button type="submit">Corregir</button>
    </form>

    <p id="missatge" aria-live="polite"></p>
  </main>

  <script>
    const test = document.querySelector('#test');
    const missatge = document.querySelector('#missatge');

    test.addEventListener('submit', (event) => {
      event.preventDefault();
      const resposta = document.querySelector('input[name="resposta"]:checked');

      if (!resposta) {
        missatge.textContent = 'Selecciona una opció abans de corregir.';
        missatge.className = 'incorrecte';
      } else if (resposta.value === 'oberta') {
        missatge.textContent = 'Correcte! En «soci», la o tònica és oberta perquè la síl·laba següent conté una i.';
        missatge.className = 'correcte';
      } else {
        missatge.textContent = 'No és correcte. En «soci», la o tònica és oberta perquè la síl·laba següent conté una i.';
        missatge.className = 'incorrecte';
      }
    });
  </script>
</body>
</html>
