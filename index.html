<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pràctica de Fonètica PAU</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main>
    <h1>Pràctica de Fonètica PAU</h1>
    <p class="instruccions">Llig la pregunta, selecciona una opció i prem «Corregir» per comprovar la resposta.</p>

    <nav class="pestanyes" aria-label="Categories d'exercicis">
      <button type="button" class="pestanya activa" data-categoria="Vocals" aria-selected="true">Vocals</button>
      <button type="button" class="pestanya" data-categoria="Consonants" aria-selected="false">Consonants</button>
      <button type="button" class="pestanya" data-categoria="Elisions" aria-selected="false">Elisions</button>
      <button type="button" class="pestanya" data-categoria="Diftongs/hiats" aria-selected="false">Diftongs/hiats</button>
      <button type="button" class="pestanya" data-categoria="Textos" aria-selected="false">Textos</button>
    </nav>

    <form id="test">
      <div id="contenidor-pregunta"></div>
    </form>

    <p id="missatge" aria-live="polite"></p>
  </main>

  <script src="js/script.js" defer></script>
</body>
</html>
