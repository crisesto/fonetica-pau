<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pràctica de Fonètica PAU</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main>
    <h1>Pràctica de Fonètica PAU</h1>
    <p class="instruccions">Llig la pregunta, selecciona una opció i prem «Corregir» per comprovar la resposta.</p>

    <form id="test">
      <fieldset>
        <legend>Com es pronuncia la <u>o</u> tònica de la paraula «soci»?</legend>
        <label><input type="radio" name="resposta" value="oberta"> Oberta</label>
        <label><input type="radio" name="resposta" value="tancada"> Tancada</label>
      </fieldset>
      <button type="submit">Corregir</button>
    </form>

    <p id="missatge" aria-live="polite"></p>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
